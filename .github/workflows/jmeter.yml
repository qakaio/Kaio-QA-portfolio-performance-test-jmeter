name: JMeter Performance Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        type: choice
        options:
          - load
          - stress
          - smoke
          - all
        default: 'all'

jobs:
  test:
    name: JMeter Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        test_type: ['jsonplaceholder-load-test', 'api-stress-test', 'api-smoke-test']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install JMeter
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "$PWD/apache-jmeter-5.6.3/bin" >> $GITHUB_PATH

      - name: Run JMeter Test
        run: |
          jmeter -n -t tests/${{ matrix.test_type }}.jmx -l results-${{ matrix.test_type }}.jtl

      - name: Upload JTL Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-results-${{ matrix.test_type }}
          path: results-${{ matrix.test_type }}.jtl
          retention-days: 30

      - name: Upload HTML Dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-dashboard-${{ matrix.test_type }}
          path: reports/
          retention-days: 30

  allure:
    name: Generate Allure Report
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install JMeter
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "$PWD/apache-jmeter-5.6.3/bin" >> $GITHUB_PATH

      - name: Download Allure JMeter Plugin
        run: |
          mkdir -p lib
          wget -q -O lib/jmeter-allure-plugin-2.16.0.zip https://repo.maven.apache.org/maven2/io/qameta/allure/jmeter-allure-plugin/2.16.0/jmeter-allure-plugin-2.16.0.zip
          unzip -o lib/jmeter-allure-plugin-2.16.0.zip -d lib/
          cp lib/jmeter-allure-plugin-2.16.0/*.jar apache-jmeter-5.6.3/lib/

      - name: Create jmeter.properties
        run: |
          echo "jmeter.save.saveservice.output_format=xml" > jmeter.properties
          echo "jmeter.save.saveservice.assertion_results=all" >> jmeter.properties
          echo "jmeter.save.saveservice.assertion_results_failure_message=true" >> jmeter.properties
          echo "allure.results.directory=allure-results" >> jmeter.properties

      - name: Run JMeter Tests for Allure
        run: |
          jmeter -n -t tests/jsonplaceholder-load-test.jmx -l results-load.jtl

      - name: Download Allure
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.30.0/allure-2.30.0.tgz
          tar -xzf allure-2.30.0.tgz

      - name: Generate Allure Report
        if: always()
        run: |
          $PWD/allure-2.30.0/bin/allure generate allure-results --clean -o allure-report
        env:
          ALLURE_RESULTS_DIR: allure-results

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: allure-report
          keep_files: true
          force_orphan: true