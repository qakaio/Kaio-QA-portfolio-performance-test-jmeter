name: JMeter Performance Tests

on:
  schedule:
    - cron: '0 2 * * 0'  # Weekly Sunday 2AM
  workflow_dispatch:
    inputs:
      test-plan:
        description: 'Test plan to run'
        required: true
        type: choice
        options:
          - jsonplaceholder-load
          - api-stress
          - api-smoke
        default: 'jsonplaceholder-load'

jobs:
  performance:
    name: JMeter Performance Test (${{ github.event.inputs.test-plan || 'jsonplaceholder-load' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Java
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk
          java -version
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Verify Java
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
          which java

      - name: Install JMeter
        run: |
          JMETER_VERSION=5.6.3
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${JMETER_VERSION}.tgz
          tar -xzf apache-jmeter-${JMETER_VERSION}.tgz
          echo "$PWD/apache-jmeter-${JMETER_VERSION}/bin" >> $GITHUB_PATH
          echo "JMETER_HOME=$PWD/apache-jmeter-${JMETER_VERSION}" >> $GITHUB_ENV

      - name: Test Network Connectivity
        run: |
          echo "Testing connectivity to jsonplaceholder.typicode.com..."
          curl -I https://jsonplaceholder.typicode.com/users || echo "curl failed"
          ping -c 2 jsonplaceholder.typicode.com || echo "ping failed"

      - name: Run JMeter Test
        run: |
          TEST_PLAN="${{ github.event.inputs.test-plan || 'jsonplaceholder-load' }}"
          if [ ! -f "tests/${TEST_PLAN}-test.jmx" ]; then
            echo "Test plan tests/${TEST_PLAN}-test.jmx not found"
            echo "Available test plans:"
            ls -la tests/
            exit 1
          fi
          
          echo "Running JMeter test: ${TEST_PLAN}"
          jmeter -n -t "tests/${TEST_PLAN}-test.jmx" -l results.jtl -e -o html-report -j jmeter.log
          echo "TEST_PLAN=${TEST_PLAN}" >> $GITHUB_ENV

      - name: Show JMeter Log on Failure
        if: failure()
        run: |
          echo "=== JMeter Log ==="
          cat jmeter.log || true

      - name: Show Results Preview on Failure
        if: failure()
        run: |
          echo "=== Results Preview ==="
          head -20 results.jtl || true

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-report-${{ env.TEST_PLAN }}
          path: html-report/
          retention-days: 30

      - name: Upload Raw Results
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-results-${{ env.TEST_PLAN }}
          path: results.jtl
          retention-days: 30

      - name: Upload JMeter Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-log-${{ env.TEST_PLAN }}
          path: jmeter.log
          retention-days: 30

      - name: Check Thresholds
        if: always()
        run: |
          if [ ! -f results.jtl ]; then
            echo "❌ No results file found"
            exit 1
          fi
          
          ERROR_RATE=$(awk -F',' 'NR>1 && $8=="false" {errors++} END {if (NR>1) print errors/(NR-1)*100; else print 0}' results.jtl)
          AVG_RESPONSE=$(awk -F',' 'NR>1 {sum+=$2} END {if (NR>1) print sum/(NR-1); else print 0}' results.jtl)
          
          echo "Error Rate: ${ERROR_RATE}%"
          echo "Avg Response: ${AVG_RESPONSE}ms"
          
          # Thresholds
          if (( $(echo "$ERROR_RATE > 5" | bc -l) )); then
            echo "❌ Error rate > 5%"
            exit 1
          fi
          
          if (( $(echo "$AVG_RESPONSE > 2000" | bc -l) )); then
            echo "❌ Avg response > 2000ms"
            exit 1
          fi
          
          echo "✅ All thresholds passed"