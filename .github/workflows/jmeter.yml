name: JMeter Performance Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        type: choice
        options:
          - load
          - stress
          - smoke
          - all
        default: 'all'

jobs:
  test:
    name: JMeter Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        test_type: ['jsonplaceholder-load-test', 'api-stress-test', 'api-smoke-test']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install JMeter
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "$PWD/apache-jmeter-5.6.3/bin" >> $GITHUB_PATH

      - name: Create jmeter.properties
        run: |
          echo "jmeter.save.saveservice.output_format=xml" > jmeter.properties
          echo "jmeter.save.saveservice.assertion_results=all" >> jmeter.properties
          echo "jmeter.save.saveservice.assertion_results_failure_message=true" >> jmeter.properties

      - name: Run JMeter Test
        run: |
          jmeter -n -t tests/${{ matrix.test_type }}.jmx -l results-${{ matrix.test_type }}.jtl

      - name: Convert JTL to Allure Results
        if: always()
        run: |
          python scripts/jtl_to_allure.py results-${{ matrix.test_type }}.jtl --output-dir allure-results-${{ matrix.test_type }}

      - name: Upload JTL Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-results-${{ matrix.test_type }}
          path: results-${{ matrix.test_type }}.jtl
          retention-days: 30

      - name: Upload HTML Dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-dashboard-${{ matrix.test_type }}
          path: reports/
          retention-days: 30

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.test_type }}
          path: allure-results-${{ matrix.test_type }}/
          retention-days: 7

  allure:
    name: Generate Allure Report
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download All Allure Results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results/
          merge-multiple: true

      - name: Install Allure
        run: npm install -g allure-commandline

      - name: Generate Allure Report
        if: always()
        run: |
          allure generate allure-results --clean -o allure-report --name "Kaio-QA-portfolio-performance-test-jmeter - JMeter Performance Tests"

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: allure-report
          keep_files: true

  deploy-pages:
    name: Deploy JMeter Reports to GitHub Pages
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download HTML Dashboards
        uses: actions/download-artifact@v4
        with:
          pattern: jmeter-dashboard-*
          path: jmeter-dashboard-merged/
          merge-multiple: true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./jmeter-dashboard-merged
          destination_dir: .
          keep_files: true
